<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HSRC Challenge Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" referrerpolicy="no-referrer" />
</head>

<body class="bg-slate-100 min-h-screen">
  <style>
    :root{
      --primary:#0F766E;
      --accent:#10B981; /* emerald */
      --bg:#F8FAFC;
      --card:#ffffff;
      --radius:16px;
      --shadow:0 10px 30px rgba(15, 118, 110, .08);
      --shadow-sm:0 6px 18px rgba(2, 6, 23, .06);
    }

    html,body{height:100%;}

    body{
      background: var(--bg) !important;
      color:#0f172a;
    }

    .bbai-card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow-sm);
      border:1px solid rgba(15,118,110,.10);
    }

    .bbai-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
    }

    .bbai-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(15,118,110,.08);
      border:1px solid rgba(15,118,110,.16);
      color:#0f766e;
      font-weight:800;
      font-size:12px;
      letter-spacing:.02em;
      white-space:nowrap;
    }

    .bbai-btn{
      border-radius:12px;
      box-shadow:0 6px 16px rgba(2,6,23,.08);
      transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }

    .bbai-btn:hover{ transform: translateY(-1px); box-shadow:0 10px 22px rgba(2,6,23,.12); }

    .bbai-filter-label{font-weight:800; color:#0f172a; font-size:13px;}

    .bbai-input{
      border-radius:12px !important;
      border:1px solid rgba(15,118,110,.18) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
      transition:border-color .15s ease, box-shadow .15s ease;
      background:#fff;
    }
    .bbai-input:focus{
      outline:none;
      border-color:rgba(15,118,110,.55) !important;
      box-shadow:0 0 0 3px rgba(15,118,110,.18);
    }

    .bbai-table-wrap{
      border-radius:var(--radius);
      background:#fff;
      border:1px solid rgba(15,118,110,.10);
      box-shadow:var(--shadow-sm);
      overflow:hidden;
    }

    /* Sticky header */
    #adminTableBody{ /* ensure tbody exists */ }

    thead th{
      position:sticky;
      top:0;
      z-index:2;
      background:#f1f5f9 !important;
      font-weight:900;
      font-size:12px;
      color:#334155;
      letter-spacing:.02em;
    }

    table{border-collapse:separate; border-spacing:0;}
    tbody tr{transition: background-color .15s ease, transform .15s ease;}
    tbody tr:hover{ background: rgba(15,118,110,.045); }

    /* Turn status span into badge pill */
    td .text-green-600,
    td .text-red-600,
    td .text-amber-600{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      font-weight:900 !important;
      letter-spacing:.02em;
      background: rgba(15,118,110,.06);
    }
    /* Approved green */
    td span.text-green-600{ background: rgba(16,185,129,.12) !important; }
    /* Rejected red */
    td span.text-red-600{ background: rgba(239,68,68,.10) !important; }
    /* Pending amber */
    td span.text-amber-600{ background: rgba(245,158,11,.14) !important; }

    /* Action button polish (JS-generated classes remain; we enhance via wrapper) */
    .bbai-action-row button{
      border-radius:12px;
      transition: transform .15s ease, filter .15s ease, box-shadow .15s ease;
      box-shadow:0 6px 16px rgba(2,6,23,.10);
    }
    .bbai-action-row button:hover{ transform: translateY(-1px); filter:saturate(1.05); }

    /* Empty state row */
    .bbai-empty-row{ background: rgba(15,118,110,.02); }

    /* Loading overlay spinner */
    #loadingOverlay .bbai-spinner{
      width:44px;height:44px;
      border-radius:999px;
      border:4px solid rgba(15,118,110,.18);
      border-top-color:#0F766E;
      animation: bbai-spin 0.85s linear infinite;
      margin:0 auto 12px auto;
    }
    @keyframes bbai-spin{ to{ transform: rotate(360deg);} }

    /* Subtle fade-in */
    @keyframes bbai-fade-up{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
    .bbai-animate-in{ animation: bbai-fade-up .35s ease-out both; }

    @media (max-width: 640px){
      .bbai-header{ flex-direction:column; align-items:flex-start; }
    }
  </style>

  <div class="max-w-6xl mx-auto p-4 md:p-8">
    <div class="bbai-card p-6 mb-6 bbai-animate-in">
      <div class="bbai-header">
        <div>
          <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800">HSRC Challenge Admin</h1>
          <p class="text-sm text-slate-500 mt-1">Review and approve/reject Step1–Step8 submissions.</p>
        </div>

        <div class="flex items-start gap-3">
          <div class="bbai-badge" title="Current date">
            <i class="fa-solid fa-calendar-days" aria-hidden="true"></i>
            <span id="bbai-current-date">—</span>
          </div>
          <div class="bbai-badge" title="Admin">
            <i class="fa-solid fa-user-shield" aria-hidden="true"></i>
            Admin
          </div>
        </div>
      </div>

      <p class="mt-3 text-xs md:text-sm text-slate-500">Authorized access for admin review.</p>
    </div>

    <div class="bbai-card p-6 mb-6 bbai-animate-in">
      <div class="grid grid-cols-1 md:grid-cols-[1fr_1.3fr_1fr_auto] gap-4 items-end">

        <!-- Premium filter panel (UI only; IDs unchanged) -->

        <div>
          <label class="block font-bold mb-2">
            Admin Key
          </label>

          <input id="adminKey" type="password" placeholder="Enter admin key" class="w-full border rounded-lg p-3 bbai-input"/>
        </div>

        <div>
          <label class="block font-bold mb-2">
            Email
          </label>

          <input id="emailFilter" type="email" placeholder="user@email.com" class="w-full border rounded-lg p-3 bbai-input"/>
        </div>

        <div>
          <label class="block font-bold mb-2">
            Team Name
          </label>

          <input id="teamFilter" type="text" placeholder="Gold Keeper" class="w-full border rounded-lg p-3 bbai-input"/>
        </div>

        <div class="flex gap-2">
          <button onclick="loadSubmissions()"
            class="bbai-btn bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg font-bold text-sm">
            <i class="fa-solid fa-bolt mr-2" aria-hidden="true"></i>
            Load
          </button>

          <button onclick="clearFilter()"
            class="bbai-btn bg-slate-300 hover:bg-slate-400 px-4 py-3 rounded-lg font-bold text-sm">
            <i class="fa-solid fa-eraser mr-2" aria-hidden="true"></i>
            Clear
          </button>
        </div>

      </div>

      <p id="statusText" class="mt-3 text-sm text-slate-500">Ready.</p>

      <!-- Quick filter chips (UI only; client-side only) -->
      <div class="mt-4">
        <div class="bbai-filter-label mb-2">Quick Filters</div>
        <div class="flex flex-wrap gap-2" role="group" aria-label="Filter submissions">
          <button type="button" data-filter-chip="All" class="bbai-btn inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 font-extrabold text-sm text-slate-700" aria-pressed="true">All</button>
          <button type="button" data-filter-chip="Pending" class="bbai-btn inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 font-extrabold text-sm text-slate-700" aria-pressed="false">🟡 Pending</button>
          <button type="button" data-filter-chip="Approved" class="bbai-btn inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 font-extrabold text-sm text-slate-700" aria-pressed="false">🟢 Approved</button>
          <button type="button" data-filter-chip="Rejected" class="bbai-btn inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 font-extrabold text-sm text-slate-700" aria-pressed="false">🔴 Rejected</button>
        </div>
      </div>
    </div>

    <!-- Dashboard summary cards (UI-only; computed from already-rendered rows) -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="bbai-card p-5 bbai-animate-in">
        <div class="flex items-center justify-between">
          <div class="text-3xl" aria-hidden="true">👥</div>
          <div class="w-10 h-10 rounded-2xl bg-emerald-50 flex items-center justify-center" aria-hidden="true"><i class="fa-solid fa-users text-emerald-600"></i></div>
        </div>
        <div class="mt-3 text-3xl font-extrabold text-slate-800" id="bbai-total-users">0</div>
        <div class="text-sm font-bold text-slate-500 mt-1">Total Users</div>
      </div>

      <div class="bbai-card p-5 bbai-animate-in">
        <div class="flex items-center justify-between">
          <div class="text-3xl" aria-hidden="true">🟡</div>
          <div class="w-10 h-10 rounded-2xl bg-amber-50 flex items-center justify-center" aria-hidden="true"><i class="fa-solid fa-hourglass-half text-amber-600"></i></div>
        </div>
        <div class="mt-3 text-3xl font-extrabold text-slate-800" id="bbai-pending-count">0</div>
        <div class="text-sm font-bold text-slate-500 mt-1">Pending</div>
      </div>

      <div class="bbai-card p-5 bbai-animate-in">
        <div class="flex items-center justify-between">
          <div class="text-3xl" aria-hidden="true">🟢</div>
          <div class="w-10 h-10 rounded-2xl bg-emerald-50 flex items-center justify-center" aria-hidden="true"><i class="fa-solid fa-check-circle text-emerald-600"></i></div>
        </div>
        <div class="mt-3 text-3xl font-extrabold text-slate-800" id="bbai-approved-count">0</div>
        <div class="text-sm font-bold text-slate-500 mt-1">Approved</div>
      </div>

      <div class="bbai-card p-5 bbai-animate-in">
        <div class="flex items-center justify-between">
          <div class="text-3xl" aria-hidden="true">🔴</div>
          <div class="w-10 h-10 rounded-2xl bg-red-50 flex items-center justify-center" aria-hidden="true"><i class="fa-solid fa-xmark-circle text-red-600"></i></div>
        </div>
        <div class="mt-3 text-3xl font-extrabold text-slate-800" id="bbai-rejected-count">0</div>
        <div class="text-sm font-bold text-slate-500 mt-1">Rejected</div>
      </div>
    </div>

    <div class="bbai-card p-4 md:p-6 overflow-x-auto">
      <table class="w-full table-fixed border-collapse">
        <colgroup>
          <col style="width:15%">
          <col style="width:25%">
          <col style="width:10%">
          <col style="width:15%">
          <col style="width:15%">
          <col style="width:20%">
        </colgroup>
        <thead class="bg-slate-100">
          <tr>
            <th class="border p-2">Team Name</th>
            <th class="border p-2">Email</th>
            <th class="border p-2">Step</th>
            <th class="border p-2">File</th>
            <th class="border p-2">Status</th>
            <th class="border p-2">Action</th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>

  <script>
    const CHALLENGE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyMOvWs_J_4154St4k3JteuNottUdZ92g-l0EUNQbiKdfEbUOKFnIzfUjjufV8ZRH25IQ/exec";

    function showLoading(show) {
      const overlay = document.getElementById('loadingOverlay');
      if (overlay) {
        show ? overlay.classList.remove('hidden') : overlay.classList.add('hidden');
      }
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById("statusText");
      if (el) {
        el.textContent = msg;
        el.className = "mt-3 text-sm " + (isError ? "text-red-600" : "text-slate-500");
      }
    }

    function clearFilter() {

      document.getElementById("emailFilter").value = "";
      document.getElementById("teamFilter").value = "";
      document.getElementById("adminTableBody").innerHTML = "";

      setStatus("Ready.");

    }

    function normalizeStatus(v) {

      if (!v) return "Pending";
      const s = String(v).trim().toLowerCase();
      if (s.includes("approved") || s.includes("stamp")) {
        return "Approved";
      }
      if (s.includes("rejected")) {
        return "Rejected";
      }
      return "Pending";
    }

    async function loadSubmissions() {
      const adminKey = document.getElementById("adminKey").value.trim();
      const email = document.getElementById("emailFilter").value.trim();
      const team = document.getElementById("teamFilter").value.trim();

      if (!adminKey) { alert("Admin key is required."); return; }

      setStatus("Loading submissions...");
      const payload = new URLSearchParams();
      payload.append("action", "admin_get_submissions");
      payload.append("adminKey", adminKey);
      if (email) { payload.append("email", email); }
      if (team) { payload.append("team", team); }

      try {
        const resp = await fetch(CHALLENGE_WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
          body: payload.toString()
        });

        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || "Failed to load.");
        renderRows(data.rows || []);
        setStatus(`Loaded ${data.rows?.length || 0} row(s).`);
      } catch (err) {
        setStatus(err.message, true);
      }
    }

    function renderRows(rows) {
      const tbody = document.getElementById("adminTableBody");
      tbody.innerHTML = "";
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="border p-3 text-center text-slate-500">No submissions found.</td></tr>`;
        return;
      }
      rows.forEach((row) => {
        const TeamName = row.team || "-";
        const email = row.email || "";
        for (let step = 1; step <= 8; step++) {
          const fileUrl = row[`step${step}`] || "";
          const rawStatus = row[`step${step}Status`] || "";
          const status = normalizeStatus(rawStatus);
          const rejectNote = rawStatus.includes("-")
            ? rawStatus.split("-").slice(1).join("-").trim()
            : "";
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="border p-2">${TeamName}</td>
            <td class="border p-2">${email}</td>
            <td class="border p-2 font-bold">Step ${step}</td>
            <td class="border p-2">${fileUrl ? `<a href="${fileUrl}" target="_blank" class="text-blue-600 underline">Open File</a>` : `<span class="text-slate-400">No file</span>`}</td>
            <td class="border p-2"><span class="${status === "Approved" ? "text-green-600 font-bold" : status === "Rejected" ? "text-red-600 font-bold" : "text-amber-600 font-bold"}">${status}</span></td>
            <td class="border p-2"><div class="flex gap-2"><button class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-xs" onclick="updateStepStatus('${email}', ${step}, 'Approved')">Approve</button><button class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-xs" onclick="updateStepStatus('${email}', ${step}, 'Rejected - Not clear/valid Image')">Reject</button></div></td>`;
          tbody.appendChild(tr);
        }
      });
    }

    async function updateStepStatus(email, stepNumber, status) {
      const adminKey = document.getElementById("adminKey").value.trim();
      if (!adminKey) { alert("Admin key is required."); return; }
      if (status === "Rejected") {
        status = "Rejected - Not clear/valid Image";
      }

      // I-trigger ang loading screen
      showLoading(true);
      setStatus(`Updating...`);

      const payload = new URLSearchParams();
      payload.append("action", "admin_update_step_status");
      payload.append("adminKey", adminKey);
      payload.append("email", email);
      payload.append("stepNumber", String(stepNumber));
      payload.append("status", status);

      try {
        const resp = await fetch(CHALLENGE_WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
          body: payload.toString()
        });

        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || "Failed to update.");

        // Pagkatapos mag-update, tawagin ang loadSubmissions
        await loadSubmissions();
        setStatus(`Successfully set to ${status}.`);
      } catch (err) {
        setStatus("Error: " + err.message, true);
      } finally {
        // SIGURADUHING mawawala ang loading DITO
        showLoading(false);
      }
    }
  </script>

  <div id="loadingOverlay" class="hidden fixed inset-0 bg-white bg-opacity-75 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-lg shadow-xl text-center">
      <div class="bbai-spinner" aria-hidden="true"></div>
      <div class="text-base font-extrabold text-slate-800">Loading submissions...</div>
      <div class="text-xs text-slate-500 mt-1">Please wait</div>
    </div>
  </div>

  <script>
    (function(){
      var el = document.getElementById('bbai-current-date');
      if(!el) return;
      try{
        el.textContent = new Date().toLocaleDateString(undefined,{year:'numeric',month:'short',day:'2-digit'});
      }catch(e){
        el.textContent = '—';
      }
    })();
  </script>
</body>

</html>
